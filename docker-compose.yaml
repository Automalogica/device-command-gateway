services:

  # ── MQTT Broker — EMQX ────────────────────────────────────────────────────
  emqx:
    image: emqx:5.7
    container_name: camera_emqx
    restart: unless-stopped
    ports:
      - "1883:1883"     # MQTT TCP
      - "8083:8083"     # MQTT WebSocket
      - "18083:18083"   # Dashboard EMQX (admin/public por padrão)
    environment:
      EMQX_NODE_NAME: emqx@camera_emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
      # ACL: permite apenas os dois tópicos do sistema
      EMQX_AUTHORIZATION__NO_MATCH: deny
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./config/emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
    networks:
      - camera_net
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Banco de dados — PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: camera_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - camera_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Camera Agent ───────────────────────────────────────────────────────────
  camera-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera_agent
    restart: unless-stopped
    ports:
      - "8080:8080"     # Endpoint /health
    environment:
      # MQTT
      MQTT_HOST: emqx
      MQTT_PORT: 1883
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TOPIC_COMMAND: camera/command
      MQTT_TOPIC_FEEDBACK: camera/feedback
      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Worker pool
      WORKER_POOL_SIZE: ${WORKER_POOL_SIZE:-10}
      # Telnet
      TELNET_TIMEOUT_MS: ${TELNET_TIMEOUT_MS:-5000}
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - camera_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  emqx_data:
  emqx_log:
  postgres_data:

# ── Rede interna ──────────────────────────────────────────────────────────────
networks:
  camera_net:
    driver: bridge