%% EMQX ACL — Plataforma de Comando de Câmeras
%%
%% Política padrão: deny (definida no docker-compose via EMQX_AUTHORIZATION__NO_MATCH)
%% Apenas os dois tópicos do sistema são permitidos.

%% Elipse E3: pode publicar em camera/command
{allow, {user, "elipse_e3"},   publish,   ["camera/command"]}.

%% Camera Agent: pode assinar camera/command e publicar camera/feedback
{allow, {user, "camera_agent"}, subscribe, ["camera/command"]}.
{allow, {user, "camera_agent"}, publish,   ["camera/feedback"]}.

%% Elipse E3: pode assinar camera/feedback para receber retornos
{allow, {user, "elipse_e3"},   subscribe, ["camera/feedback"]}.

%% Nega qualquer outra combinação
{deny, all}.